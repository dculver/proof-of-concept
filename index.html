<!DOCTYPE html>
<html>
  <head>
    <title>Multimodal Proof of Concept Simulation</title>
    <script src="js/jspsych.js"></script>
    <link href="js/jspsych.css" rel="stylesheet" type="text/css" />

    <script src="js/plugin-html-keyboard-response.js"></script>
    <script src="js/plugin-image-keyboard-response.js"></script>
    <script src="js/plugin-preload.js"></script>

    <script src="js/webgazer.js"></script>
    <script src="js/extension-webgazer.js"></script>
    <script src="js/plugin-webgazer-init-camera.js"></script>
    <script src="js/plugin-webgazer-init-calibrate.js"></script>

    <script src="js/plugin-initialize-microphone.js"></script>
    <script src="js/plugin-html-audio-response.js"></script>
  </head>
  <body></body>
  <script>

    /* --- VOLATILE DATA STORAGE FOR TIMELINE REENACTMENT --- */
    let playbackTimeline = [];
    let playbackGazePoints = [];
    let totalPlaybackDuration = 0;
    let playbackStartTime = 0;
    let isPlaybackActive = false;

    // Automated interception framework to map video style parameters safely
    if (window.webgazer && typeof webgazer.showVideo === 'function') {
      var originalShowVideo = webgazer.showVideo;
      webgazer.showVideo = function(val) {
        if (document.getElementById('webgazerVideoFeed')) {
          return originalShowVideo.apply(this, arguments);
        } else {
          console.warn("Defensive Patch: Suppressed video style shift on missing DOM element.");
          return this;
        }
      };
    }

    // Helper: Processes trial logs to construct a deterministic replay timeline
    function buildPlaybackTimeline(blockTaskLabel) {
      playbackTimeline = [];
      playbackGazePoints = [];
      let currentOffset = 0;

      // Extract raw trial data logged natively by jsPsych
      let blockTrials = jsPsych.data.get().filter({ task: blockTaskLabel }).values();
      
      blockTrials.forEach(trial => {
        // 1. Reconstruct the Fixation cross period (1000ms)
        playbackTimeline.push({
          startTime: currentOffset,
          endTime: currentOffset + 1000,
          type: 'fixation'
        });
        currentOffset += 1000;

        // 2. Reconstruct the Stimulus presentation period (matching user reaction latency)
        playbackTimeline.push({
          startTime: currentOffset,
          endTime: currentOffset + trial.rt,
          type: 'stimulus',
          src: trial.stimulus
        });

        // 3. Extract and synchronize the eye-gaze coordinate logs
        if (trial.webgazer_data) {
          let gazeData = typeof trial.webgazer_data === 'string' ? JSON.parse(trial.webgazer_data) : trial.webgazer_data;
          gazeData.forEach(point => {
            playbackGazePoints.push({
              x: point.x,
              y: point.y,
              t: currentOffset + point.t // Re-indexed time marker relative to replay zero-point
            });
          });
        }
        currentOffset += trial.rt;
      });

      totalPlaybackDuration = currentOffset;
      playbackGazePoints.sort((a, b) => a.t - b.t);
    }

    /* Initialize jsPsych with the WebGazer Extension active */
    var jsPsych = initJsPsych({
      extensions: [
        { type: jsPsychExtensionWebgazer }
      ],
      on_finish: function() {
        document.body.innerHTML = '<div style="text-align:center; margin-top:20%; font-family:Arial;"><h3>Syncing data securely to central repository... Please do not close this tab.</h3></div>';
        transmitDataPayload(jsPsych.data.get().json());
      }
    });

    var timeline = [];

    /* 1. Preload Images */
    var preload = {
      type: jsPsychPreload,
      images: ['img/blue.png', 'img/orange.png']
    };
    timeline.push(preload);

    /* 2. Microphone Hardware Initialization */
    var init_mic = {
      type: jsPsychInitializeMicrophone,
      error_message: "<p>Microphone access is required to participate in this study. Please check your browser settings and refresh.</p>"
    };
    timeline.push(init_mic);

    /* 3. Eye-Tracker Calibration Instructions Screen */
    var eye_tracker_instructions = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div style="width:650px; text-align:left; font-family:Arial, sans-serif; line-height:1.6; margin:auto; background:#f9f9f9; padding:30px; border:1px solid #ddd; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.05);">
          <h2 style="color:#2980b9; margin-top:0; text-align:center;">🎯 Eye-Tracker Calibration Setup</h2>
          <p>Before beginning the main simulation, we need to calibrate the eye-tracking system to map your gaze accurately.</p>
          <ol style="padding-left:20px; margin-bottom: 20px;">
            <li><strong>Webcam Alignment:</strong> On the next screen, center your face in the box until the tracking parameters lock, then click "Continue to Calibration".</li>
            <li><strong>Training the Grid:</strong> Black dots will appear one by one across a completely clean screen.</li>
            <li><strong>Look and Click:</strong> Look directly at each black dot and <strong>click it</strong>. It will move once your coordinates record.</li>
          </ol>
          <p style="text-align:center; font-weight:bold; margin-bottom:0; padding-top:15px; border-top:1px solid #eee; color:#2c3e50;">Press any key to start the hardware setup.</p>
        </div>
      `
    };
    timeline.push(eye_tracker_instructions);

    /* 4. WebGazer Camera Authorization */
    var init_camera = {
      type: jsPsychWebgazerInitCamera,
      instructions: "<p>Center your face in the webcam window until the tracking indicators align.</p>",
      button_text: "Continue to Calibration"
    };
    timeline.push(init_camera);

    /* 5. WebGazer Calibration Grid Setup */
    var calibration_grid = {
      type: jsPsychWebgazerCalibrate,
      calibration_mode: 'click',
      calibration_points: [[10,10], [10,50], [10,90], [50,10], [50,50], [50,90], [90,10], [90,50], [90,90]],
      point_size: 20
    };
    timeline.push(calibration_grid);

    /* 6. General Welcome Message */
    var welcome = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: "Welcome to the simulation tasks. Press any key to view the Block 1 brief."
    };
    timeline.push(welcome);


    /* ================= BLOCK 1 PROTOCOL ================= */

    var block_1_brief = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: "<p><strong>LAUNCHING BLOCK 1.</strong></p><p>Press F for Blue, J for Orange. Speed and accuracy metrics apply.</p><p>Press any key to start block trials.</p>"
    };
    timeline.push(block_1_brief);

    var stimuli_block_1 = [
      { stimulus: "img/blue.png",  correct_response: 'f'},
      { stimulus: "img/orange.png",  correct_response: 'j'}
    ];

    var fixation = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '<div style="font-size:60px;">+</div>',
      choices: "NO_KEYS",
      trial_duration: 1000
    };

    var trial_structure_block_1 = {
      type: jsPsychImageKeyboardResponse,
      stimulus: jsPsych.timelineVariable('stimulus'),
      choices: ['f', 'j'],
      extensions: [{ type: jsPsychExtensionWebgazer, params: { targets: ['#jspsych-image-keyboard-response-stimulus'] } }],
      data: { task: 'b1_response', correct_response: jsPsych.timelineVariable('correct_response') },
      on_finish: function(data){ data.correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response); }
    };

    var block_1_loop = {
      timeline: [fixation, trial_structure_block_1],
      timeline_variables: stimuli_block_1,
      repetitions: 2,
      randomize_order: true
    };
    timeline.push(block_1_loop);

    // Compiles logs instantly from memory cache rather than waiting for an asynchronous hardware handler
    var compile_block_1_media = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '<div style="text-align:center; font-family:Arial;"><h3>Processing segment replay files locally... Please wait.</h3></div>',
      choices: "NO_KEYS",
      trial_duration: 800,
      on_finish: function() {
        buildPlaybackTimeline('b1_response');
      }
    };
    timeline.push(compile_block_1_media);

    /* HIGH-STABILITY RETROSPECTIVE TRIAL LAYER: Animates code structures natively over the Canvas frame */
    var rta_block_1 = {
      type: jsPsychHtmlAudioResponse,
      stimulus: `
        <div style="width:820px; text-align:center; font-family:Arial, sans-serif; margin:auto;">
          <h3 style="margin-top:0; margin-bottom:5px;">Retrospective Review: Task Block 1</h3>
          <p style="color:#d9534f; margin-top:0; margin-bottom:15px;"><strong>🎙️ Audio Recording Active. Watch the red gaze indicator tracking your performance and narrate your strategy out loud:</strong></p>
          
          <div style="position:relative; width:800px; height:450px; background:#f5f5f5; margin:auto; border:2px solid #ccc; border-radius:6px; overflow:hidden;">
            <div id="block-1-stimulus-display" style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); display:flex; align-items:center; justify-content:center;"></div>
            <canvas id="block-1-gaze-overlay" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:999; pointer-events:none;"></canvas>
          </div>
        </div>
      `,
      recording_duration: 30000,
      show_done_button: true,
      data: { task: 'rta_audio_block_1' },
      on_load: function() {
        playbackStartTime = performance.now();
        isPlaybackActive = true;

        function renderReplayLoop() {
          let display = document.getElementById('block-1-stimulus-display');
          let canvas = document.getElementById('block-1-gaze-overlay');
          
          // Safety Bailout: Halts the animation thread immediately if user transitions past screen
          if (!display || !canvas || !isPlaybackActive) return;

          let elapsed = performance.now() - playbackStartTime;

          // If the timeline finishes, auto-loop back to zero to maintain presentation until narration ends
          if (elapsed > totalPlaybackDuration) {
            playbackStartTime = performance.now();
            elapsed = 0;
          }

          // 1. Re-render display elements based on time offset receipts
          let currentState = playbackTimeline.find(state => elapsed >= state.startTime && elapsed < state.endTime);
          if (currentState) {
            if (currentState.type === 'fixation') {
              display.innerHTML = '<div style="font-size:60px; font-family:Arial; color:#333;">+</div>';
            } else {
              display.innerHTML = `<img src="${currentState.src}" style="height:200px; width:auto; object-fit:contain;" />`;
            }
          } else {
            display.innerHTML = '';
          }

          // 2. Map eye-gaze coordinates over the display frame canvas context
          let ctx = canvas.getContext('2d');
          canvas.width = 800;
          canvas.height = 450;
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          let gazeIndex = 0;
          while (gazeIndex < playbackGazePoints.length && playbackGazePoints[gazeIndex].t < elapsed) {
            gazeIndex++;
          }

          if (gazeIndex > 0 && gazeIndex <= playbackGazePoints.length) {
            let pointMatch = playbackGazePoints[gazeIndex - 1];
            // Only draw bubble if coordinate corresponds to the current 400ms visual buffer window
            if (elapsed - pointMatch.t < 400) {
              let ratioX = canvas.width / window.innerWidth;
              let ratioY = canvas.height / window.innerHeight;

              ctx.beginPath();
              ctx.arc(pointMatch.x * ratioX, pointMatch.y * ratioY, 22, 0, 2 * Math.PI);
              ctx.fillStyle = "rgba(217, 83, 79, 0.65)"; // High-visibility translucent bubble
              ctx.fill();
            }
          }
          requestAnimationFrame(renderReplayLoop);
        }
        requestAnimationFrame(renderReplayLoop);
      },
      on_finish: function() {
        isPlaybackActive = false;
        playbackTimeline = [];
        playbackGazePoints = [];
      }
    };
    timeline.push(rta_block_1);


    /* ================= BLOCK 2 PROTOCOL ================= */

    var block_2_brief = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: "<p><strong>LAUNCHING BLOCK 2.</strong></p><p>System cleared. Press any key to start the second task set.</p>"
    };
    timeline.push(block_2_brief);

    var stimuli_block_2 = [
      { stimulus: "img/orange.png",  correct_response: 'j'},
      { stimulus: "img/blue.png",  correct_response: 'f'}
    ];

    var trial_structure_block_2 = {
      type: jsPsychImageKeyboardResponse,
      stimulus: jsPsych.timelineVariable('stimulus'),
      choices: ['f', 'j'],
      extensions: [{ type: jsPsychExtensionWebgazer, params: { targets: ['#jspsych-image-keyboard-response-stimulus'] } }],
      data: { task: 'b2_response', correct_response: jsPsych.timelineVariable('correct_response') },
      on_finish: function(data){ data.correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response); }
    };

    var block_2_loop = {
      timeline: [fixation, trial_structure_block_2],
      timeline_variables: stimuli_block_2,
      repetitions: 2,
      randomize_order: true
    };
    timeline.push(block_2_loop);

    var compile_block_2_media = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '<div style="text-align:center; font-family:Arial;"><h3>Processing segment replay files locally... Please wait.</h3></div>',
      choices: "NO_KEYS",
      trial_duration: 800,
      on_finish: function() {
        buildPlaybackTimeline('b2_response');
      }
    };
    timeline.push(compile_block_2_media);

    var rta_block_2 = {
      type: jsPsychHtmlAudioResponse,
      stimulus: `
        <div style="width:820px; text-align:center; font-family:Arial, sans-serif; margin:auto;">
          <h3 style="margin-top:0; margin-bottom:5px;">Retrospective Review: Task Block 2</h3>
          <p style="color:#d9534f; margin-top:0; margin-bottom:15px;"><strong>🎙️ Audio Recording Active. Evaluate your final performance out loud:</strong></p>
          <div style="position:relative; width:800px; height:450px; background:#f5f5f5; margin:auto; border:2px solid #ccc; border-radius:6px; overflow:hidden;">
            <div id="block-2-stimulus-display" style="position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); display:flex; align-items:center; justify-content:center;"></div>
            <canvas id="block-2-gaze-overlay" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:999; pointer-events:none;"></canvas>
          </div>
        </div>
      `,
      recording_duration: 30000,
      show_done_button: true,
      data: { task: 'rta_audio_block_2' },
      on_load: function() {
        playbackStartTime = performance.now();
        isPlaybackActive = true;

        function renderReplayLoop2() {
          let display = document.getElementById('block-2-stimulus-display');
          let canvas = document.getElementById('block-2-gaze-overlay');
          if (!display || !canvas || !isPlaybackActive) return;

          let elapsed = performance.now() - playbackStartTime;

          if (elapsed > totalPlaybackDuration) {
            playbackStartTime = performance.now();
            elapsed = 0;
          }

          let currentState = playbackTimeline.find(state => elapsed >= state.startTime && elapsed < state.endTime);
          if (currentState) {
            if (currentState.type === 'fixation') {
              display.innerHTML = '<div style="font-size:60px; font-family:Arial; color:#333;">+</div>';
            } else {
              display.innerHTML = `<img src="${currentState.src}" style="height:200px; width:auto; object-fit:contain;" />`;
            }
          } else {
            display.innerHTML = '';
          }

          let ctx = canvas.getContext('2d');
          canvas.width = 800;
          canvas.height = 450;
          ctx.clearRect(0, 0, canvas.width, canvas.height);

          let gazeIndex2 = 0;
          while (gazeIndex2 < playbackGazePoints.length && playbackGazePoints[gazeIndex2].t < elapsed) {
            gazeIndex2++;
          }

          if (gazeIndex2 > 0 && gazeIndex2 <= playbackGazePoints.length) {
            let pointMatch = playbackGazePoints[gazeIndex2 - 1];
            if (elapsed - pointMatch.t < 400) {
              let ratioX = canvas.width / window.innerWidth;
              let ratioY = canvas.height / window.innerHeight;
              ctx.beginPath();
              ctx.arc(pointMatch.x * ratioX, pointMatch.y * ratioY, 22, 0, 2 * Math.PI);
              ctx.fillStyle = "rgba(217, 83, 79, 0.65)";
              ctx.fill();
            }
          }
          requestAnimationFrame(renderReplayLoop2);
        }
        requestAnimationFrame(renderReplayLoop2);
      },
      on_finish: function() {
        isPlaybackActive = false;
        playbackTimeline = [];
        playbackGazePoints = [];
      }
    };
    timeline.push(rta_block_2);


    /* ================= SIMULATION DEBRIEF & CLOUD TRANSMISSION ================= */

    var debrief_block = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function() {
        var trials = jsPsych.data.get().filter([{task: 'b1_response'}, {task: 'b2_response'}]);
        var correct_trials = trials.filter({correct: true});
        var accuracy = Math.round(correct_trials.count() / trials.count() * 100);
        return `<p>Testing complete. Total accuracy calculated at ${accuracy}%.</p>
          <p>Press any key to execute terminal synchronization functions and clear system data threads.</p>`;
      }
    };
    timeline.push(debrief_block);

    function transmitDataPayload(completeDataJson) {
      const TargetSecureEndpoint = "https://your-secure-project-id.supabase.co/rest/v1/simulation_logs"; 
      
      fetch(TargetSecureEndpoint, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer YOUR_PUBLIC_ANONYMOUS_API_KEY",
          "Prefer": "return=minimal" 
        },
        body: JSON.stringify({
          participant_token: "PARTICIPANT_" + Math.random().toString(36).substring(2, 8).toUpperCase(),
          timestamp_logged: new Date().toISOString(),
          payload_data: JSON.parse(completeDataJson)
        })
      })
      .then(response => {
        if (response.ok) {
          document.body.innerHTML = '<div style="text-align:center; margin-top:20%; font-family:Arial; color:#2e7d32;"><h3>Data synchronized successfully! Your text metrics and Base64 verbal strings are recorded. You may close this window.</h3></div>';
        } else {
          throw new Error('Network synchronization error.');
        }
      })
      .catch(error => {
        console.error('Pipeline Fault:', error);
        document.body.innerHTML = '<div style="text-align:center; margin-top:15%; font-family:Arial;"><h3>Server connection timed out.</h3><p>Your audio and tracking files remain compiled. Click below to save your log metrics manually.</p></div>';
        jsPsych.data.get().localSave('csv', 'fallback_backup_log.csv');
      });
    }

    /* start the experiment */
    jsPsych.run(timeline);

  </script>
</html>
