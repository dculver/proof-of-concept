<!DOCTYPE html>
<html>
  <head>
    <title>Multimodal Proof of Concept Simulation</title>
    <script src="js/jspsych.js"></script>
    <link href="js/jspsych.css" rel="stylesheet" type="text/css" />

    <script src="js/plugin-html-keyboard-response.js"></script>
    <script src="js/plugin-image-keyboard-response.js"></script>
    <script src="js/plugin-preload.js"></script>

    <script src="js/webgazer.js"></script>
    <script src="js/extension-webgazer.js"></script>
    <script src="js/plugin-webgazer-init-camera.js"></script>
    <script src="js/plugin-webgazer-init-calibrate.js"></script>

    <script src="js/plugin-initialize-microphone.js"></script>
    <script src="js/plugin-html-audio-response.js"></script>
  </head>
  <body></body>
  <script>

    /* --- VOLATILE DATA RECORDING INFRASTRUCTURE FOR IRB PRIVACY COMPLIANCE --- */
    let screenStream = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let localVideoUrl = null;
    let recordingStartTime = 0;
    let activeGazeLogs = []; 
    let blockTrialStartTimes = []; // Universal high-resolution timing array for sync mapping

    // Automated interception framework to map video style parameters safely
    if (window.webgazer && typeof webgazer.showVideo === 'function') {
      var originalShowVideo = webgazer.showVideo;
      webgazer.showVideo = function(val) {
        if (document.getElementById('webgazerVideoFeed')) {
          return originalShowVideo.apply(this, arguments);
        } else {
          console.warn("Defensive Patch: Suppressed video style shift on missing DOM element.");
          return this;
        }
      };
    }

    // Helper: Turn on screen encoding and log block baseline clock metrics via native API
    function launchBlockRecording() {
      recordedChunks = [];
      activeGazeLogs = [];
      blockTrialStartTimes = []; 
      
      let options = {};
      if (typeof MediaRecorder.isTypeSupported === 'function') {
        if (MediaRecorder.isTypeSupported('video/webm;codecs=vp8')) {
          options = { mimeType: 'video/webm;codecs=vp8' };
        } else if (MediaRecorder.isTypeSupported('video/webm')) {
          options = { mimeType: 'video/webm' };
        } else if (MediaRecorder.isTypeSupported('video/mp4')) {
          options = { mimeType: 'video/mp4' };
        }
      }
      
      mediaRecorder = new MediaRecorder(screenStream, options);
      mediaRecorder.ondataavailable = function(e) {
        if (e.data && e.data.size > 0) { recordedChunks.push(e.data); }
      };
      
      recordingStartTime = performance.now(); // Universal zero-anchor baseline
      mediaRecorder.start(1000); 
    }

    // Helper: Halt screen recording and reconstruct coordinates deterministically from cache
    function finalizeBlockRecording(blockTaskLabel) {
      return new Promise((resolve) => {
        mediaRecorder.onstop = function() {
          let videoBlob = new Blob(recordedChunks, { type: mediaRecorder.mimeType || 'video/webm' });
          localVideoUrl = URL.createObjectURL(videoBlob);
          
          activeGazeLogs = [];
          let blockTrials = jsPsych.data.get().filter({ task: blockTaskLabel }).values();
          
          // Rebuild coordinate arrays by mapping index locations across the timing array
          for (let i = 0; i < blockTrials.length; i++) {
            let trial = blockTrials[i];
            if (trial.webgazer_data && blockTrialStartTimes[i]) {
              let trialVideoOffset = blockTrialStartTimes[i] - recordingStartTime;
              let gazeData = typeof trial.webgazer_data === 'string' ? JSON.parse(trial.webgazer_data) : trial.webgazer_data;
              
              gazeData.forEach(point => {
                activeGazeLogs.push({
                  x: point.x,
                  y: point.y,
                  t: trialVideoOffset + point.t 
                });
              });
            }
          }
          
          activeGazeLogs.sort((a, b) => a.t - b.t);
          resolve();
        };
        mediaRecorder.stop();
      });
    }

    /* Initialize jsPsych with the WebGazer Extension active */
    var jsPsych = initJsPsych({
      extensions: [
        { type: jsPsychExtensionWebgazer }
      ],
      on_finish: function() {
        document.body.innerHTML = '<div style="text-align:center; margin-top:20%; font-family:Arial;"><h3>Syncing data securely to central repository... Please do not close this tab.</h3></div>';
        transmitDataPayload(jsPsych.data.get().json());
      }
    });

    var timeline = [];

    /* 1. Preload Images */
    var preload = {
      type: jsPsychPreload,
      images: ['img/blue.png', 'img/orange.png']
    };
    timeline.push(preload);

    /* 2. Microphone Hardware Initialization */
    var init_mic = {
      type: jsPsychInitializeMicrophone,
      error_message: "<p>Microphone access is required to participate in this study. Please check your browser settings and refresh.</p>"
    };
    timeline.push(init_mic);

    /* 3. Screen Share Capture Setup */
    var request_screen_capture = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div style="width:600px; text-align:left; font-family:Arial, sans-serif; line-height:1.6; margin:auto; background:#f9f9f9; padding:30px; border:1px solid #ddd; border-radius:8px;">
          <h2 style="color:#2980b9; margin-top:0; text-align:center;">🖥️ Local Replay Interface Activation</h2>
          <p>To enable the gaze-cued retrospective video review without transmitting any video over the network, your browser requires permission to monitor this execution tab.</p>
          <p><strong>Instructions:</strong> Click the button below, choose <strong>"This Tab"</strong> (or Current Tab) from the pop-up options panel, and click <strong>Share</strong>.</p>
          <button id="authorize-capture-btn" style="display:block; margin:25px auto 0; padding:12px 24px; background:#2980b9; color:white; border:none; border-radius:4px; font-weight:bold; cursor:pointer; font-size:15px;">Authorize Replay Mode</button>
        </div>
      `,
      choices: "NO_KEYS",
      on_load: function() {
        document.getElementById('authorize-capture-btn').addEventListener('click', function() {
          navigator.mediaDevices.getDisplayMedia({
            video: { width: 1280, height: 720, frameRate: 15 }, 
            audio: false
          }).then(stream => {
            screenStream = stream;
            jsPsych.finishTrial();
          }).catch(err => {
            alert("Tab monitoring clearance is required to run this simulation loop structure.");
          });
        });
      }
    };
    timeline.push(request_screen_capture);

    /* 4. Standalone Eye-Tracker Calibration Instructions Screen */
    var eye_tracker_instructions = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div style="width:650px; text-align:left; font-family:Arial, sans-serif; line-height:1.6; margin:auto; background:#f9f9f9; padding:30px; border:1px solid #ddd; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.05);">
          <h2 style="color:#2980b9; margin-top:0; text-align:center;">🎯 Eye-Tracker Calibration Setup</h2>
          <p>Before beginning the main simulation, we need to calibrate the eye-tracking system to map your gaze accurately.</p>
          <ol style="padding-left:20px; margin-bottom: 20px;">
            <li><strong>Webcam Alignment:</strong> On the next screen, center your face in the box until the tracking parameters lock, then click "Continue to Calibration".</li>
            <li><strong>Training the Grid:</strong> Black dots will appear one by one across a completely clean screen.</li>
            <li><strong>Look and Click:</strong> Look directly at each black dot and <strong>click it</strong>. It will move once your coordinates record.</li>
          </ol>
          <p style="text-align:center; font-weight:bold; margin-bottom:0; padding-top:15px; border-top:1px solid #eee; color:#2c3e50;">Press any key to start the hardware setup.</p>
        </div>
      `
    };
    timeline.push(eye_tracker_instructions);

    /* 5. WebGazer Camera Authorization */
    var init_camera = {
      type: jsPsychWebgazerInitCamera,
      instructions: "<p>Center your face in the webcam window until the tracking indicators align.</p>",
      button_text: "Continue to Calibration"
    };
    timeline.push(init_camera);

    /* 6. WebGazer Calibration Grid Setup */
    var calibration_grid = {
      type: jsPsychWebgazerCalibrate,
      calibration_mode: 'click',
      calibration_points: [[10,10], [10,50], [10,90], [50,10], [50,50], [50,90], [90,10], [90,50], [90,90]],
      point_size: 20
    };
    timeline.push(calibration_grid);

    /* 7. General Welcome Message */
    var welcome = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: "Welcome to the simulation tasks. Press any key to view the Block 1 brief."
    };
    timeline.push(welcome);


    /* ================= BLOCK 1 PROTOCOL ================= */

    var block_1_brief = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: "<p><strong>LAUNCHING BLOCK 1.</strong></p><p>Press F for Blue, J for Orange. Speed and accuracy metrics apply.</p><p>Press any key to engage video recorder and start block trials.</p>",
      on_finish: function() { launchBlockRecording(); } 
    };
    timeline.push(block_1_brief);

    var stimuli_block_1 = [
      { stimulus: "img/blue.png",  correct_response: 'f'},
      { stimulus: "img/orange.png",  correct_response: 'j'}
    ];

    var fixation = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '<div style="font-size:60px;">+</div>',
      choices: "NO_KEYS",
      trial_duration: 1000
    };

    var trial_structure_block_1 = {
      type: jsPsychImageKeyboardResponse,
      stimulus: jsPsych.timelineVariable('stimulus'),
      choices: ['f', 'j'],
      extensions: [{ type: jsPsychExtensionWebgazer, params: { targets: ['#jspsych-image-keyboard-response-stimulus'] } }],
      data: { task: 'b1_response', correct_response: jsPsych.timelineVariable('correct_response') },
      on_load: function() {
        blockTrialStartTimes.push(performance.now());
      },
      on_finish: function(data){ data.correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response); }
    };

    var block_1_loop = {
      timeline: [fixation, trial_structure_block_1],
      timeline_variables: stimuli_block_1,
      repetitions: 2,
      randomize_order: true
    };
    timeline.push(block_1_loop);

    var compile_block_1_media = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '<div style="text-align:center; font-family:Arial;"><h3>Processing segment replay files locally... Please wait.</h3></div>',
      choices: "NO_KEYS",
      on_load: function() {
        finalizeBlockRecording('b1_response').then(() => { jsPsych.finishTrial(); });
      }
    };
    timeline.push(compile_block_1_media);

    var rta_block_1 = {
      type: jsPsychHtmlAudioResponse,
      stimulus: `
        <div style="width:820px; text-align:center; font-family:Arial, sans-serif; margin:auto;">
          <h3 style="margin-top:0; margin-bottom:5px;">Retrospective Review: Task Block 1</h3>
          <p style="color:#d9534f; margin-top:0; margin-bottom:15px;"><strong>🎙️ Audio Recording Active. Watch the red gaze indicator tracking your performance and narrate your strategy out loud:</strong></p>
          
          <div style="position:relative; width:800px; height:450px; background:black; margin:auto; border:2px solid #ccc; border-radius:6px; overflow:hidden;">
            <video id="block-1-video-replay" muted autoplay playsinline style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:contain;"></video>
            <canvas id="block-1-canvas-overlay" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:999; pointer-events:none;"></canvas>
          </div>
        </div>
      `,
      recording_duration: 30000,
      show_done_button: true,
      data: { task: 'rta_audio_block_1' },
      on_load: function() {
        let video = document.getElementById('block-1-video-replay');
        if (!video) return;

        video.src = localVideoUrl;
        
        // Native event listener guarantees metadata initialization before triggering execution
        video.addEventListener('canplay', function() {
          video.play().catch(function(err) {
            console.log("Autoplay handled natively by inline compliance layout attributes.");
          });
        });

        function syncGazeBubble() {
          // BULLETPROOF DYNAMIC POLLING: Continuously re-fetches references live inside the active frame
          let liveVideo = document.getElementById('block-1-video-replay');
          let liveCanvas = document.getElementById('block-1-canvas-overlay');
          
          // If the elements are missing, break the animation loop context instantly
          if (!liveVideo || !liveCanvas) return;

          if (liveVideo.paused || liveVideo.ended) {
            requestAnimationFrame(syncGazeBubble);
            return;
          }
          
          let ctx = liveCanvas.getContext('2d');
          if (!ctx) return;

          liveCanvas.width = 800; 
          liveCanvas.height = 450;

          let currentClipTimeMs = liveVideo.currentTime * 1000;
          let gazeIndex = 0; 

          while (gazeIndex < activeGazeLogs.length && activeGazeLogs[gazeIndex].t < currentClipTimeMs) {
            gazeIndex++;
          }

          ctx.clearRect(0, 0, liveCanvas.width, liveCanvas.height);
          
          if (gazeIndex > 0 && gazeIndex <= activeGazeLogs.length) {
            let pointMatch = activeGazeLogs[gazeIndex - 1];
            
            if (currentClipTimeMs - pointMatch.t < 400) {
              let ratioX = liveCanvas.width / window.innerWidth;
              let ratioY = liveCanvas.height / window.innerHeight;

              ctx.beginPath();
              ctx.arc(pointMatch.x * ratioX, pointMatch.y * ratioY, 22, 0, 2 * Math.PI);
              ctx.fillStyle = "rgba(217, 83, 79, 0.65)"; 
              ctx.fill();
            }
          }
          requestAnimationFrame(syncGazeBubble);
        }

        video.addEventListener('play', () => { requestAnimationFrame(syncGazeBubble); });
      },
      on_finish: function() {
        URL.revokeObjectURL(localVideoUrl); 
        localVideoUrl = null;
        recordedChunks = [];
        activeGazeLogs = []; 
      }
    };
    timeline.push(rta_block_1);


    /* ================= BLOCK 2 PROTOCOL ================= */

    var block_2_brief = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: "<p><strong>LAUNCHING BLOCK 2.</strong></p><p>System cleared. Press any key to engage video recorder and start the second task set.</p>",
      on_finish: function() { launchBlockRecording(); } 
    };
    timeline.push(block_2_brief);

    var stimuli_block_2 = [
      { stimulus: "img/orange.png",  correct_response: 'j'},
      { stimulus: "img/blue.png",  correct_response: 'f'}
    ];

    var trial_structure_block_2 = {
      type: jsPsychImageKeyboardResponse,
      stimulus: jsPsych.timelineVariable('stimulus'),
      choices: ['f', 'j'],
      extensions: [{ type: jsPsychExtensionWebgazer, params: { targets: ['#jspsych-image-keyboard-response-stimulus'] } }],
      data: { task: 'b2_response', correct_response: jsPsych.timelineVariable('correct_response') },
      on_load: function() {
        blockTrialStartTimes.push(performance.now());
      },
      on_finish: function(data){ data.correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response); }
    };

    var block_2_loop = {
      timeline: [fixation, trial_structure_block_2],
      timeline_variables: stimuli_block_2,
      repetitions: 2,
      randomize_order: true
    };
    timeline.push(block_2_loop);

    var compile_block_2_media = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '<div style="text-align:center; font-family:Arial;"><h3>Processing segment replay files locally... Please wait.</h3></div>',
      choices: "NO_KEYS",
      on_load: function() {
        finalizeBlockRecording('b2_response').then(() => { jsPsych.finishTrial(); });
      }
    };
    timeline.push(compile_block_2_media);

    var rta_block_2 = {
      type: jsPsychHtmlAudioResponse,
      stimulus: `
        <div style="width:820px; text-align:center; font-family:Arial, sans-serif; margin:auto;">
          <h3 style="margin-top:0; margin-bottom:5px;">Retrospective Review: Task Block 2</h3>
          <p style="color:#d9534f; margin-top:0; margin-bottom:15px;"><strong>🎙️ Audio Recording Active. Evaluate your final performance out loud:</strong></p>
          <div style="position:relative; width:800px; height:450px; background:black; margin:auto; border:2px solid #ccc; border-radius:6px; overflow:hidden;">
            <video id="block-2-video-replay" muted autoplay playsinline style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:contain;"></video>
            <canvas id="block-2-canvas-overlay" style="position:absolute; top:0; left:0; width:100%; height:100%; z-index:999; pointer-events:none;"></canvas>
          </div>
        </div>
      `,
      recording_duration: 30000,
      show_done_button: true,
      data: { task: 'rta_audio_block_2' },
      on_load: function() {
        let video = document.getElementById('block-2-video-replay');
        if (!video) return;

        video.src = localVideoUrl;
        
        video.addEventListener('canplay', function() {
          video.play().catch(function(err) {
            console.log("Autoplay handled natively by inline compliance layout attributes.");
          });
        });

        function syncGazeBubble2() {
          let liveVideo = document.getElementById('block-2-video-replay');
          let liveCanvas = document.getElementById('block-2-canvas-overlay');
          
          if (!liveVideo || !liveCanvas) return;

          if (liveVideo.paused || liveVideo.ended) {
            requestAnimationFrame(syncGazeBubble2);
            return;
          }
          
          let ctx = liveCanvas.getContext('2d');
          if (!ctx) return;

          liveCanvas.width = 800;
          liveCanvas.height = 450;

          let currentClipTimeMs = liveVideo.currentTime * 1000;
          let gazeIndex2 = 0;
          
          while (gazeIndex2 < activeGazeLogs.length && activeGazeLogs[gazeIndex2].t < currentClipTimeMs) {
            gazeIndex2++;
          }

          ctx.clearRect(0, 0, liveCanvas.width, liveCanvas.height);
          
          if (gazeIndex2 > 0 && gazeIndex2 <= activeGazeLogs.length) {
            let pointMatch = activeGazeLogs[gazeIndex2 - 1];
            if (currentClipTimeMs - pointMatch.t < 400) {
              let ratioX = liveCanvas.width / window.innerWidth;
              let ratioY = liveCanvas.height / window.innerHeight;
              ctx.beginPath();
              ctx.arc(pointMatch.x * ratioX, pointMatch.y * ratioY, 22, 0, 2 * Math.PI);
              ctx.fillStyle = "rgba(217, 83, 79, 0.65)";
              ctx.fill();
            }
          }
          requestAnimationFrame(syncGazeBubble2);
        }
        video.addEventListener('play', () => { requestAnimationFrame(syncGazeBubble2); });
      },
      on_finish: function() {
        URL.revokeObjectURL(localVideoUrl);
        localVideoUrl = null;
        recordedChunks = [];
        activeGazeLogs = [];
        if (screenStream) { screenStream.getTracks().forEach(track => track.stop()); }
      }
    };
    timeline.push(rta_block_2);


    /* ================= SIMULATION DEBRIEF & CLOUD TRANSMISSION ================= */

    var debrief_block = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function() {
        var trials = jsPsych.data.get().filter([{task: 'b1_response'}, {task: 'b2_response'}]);
        var correct_trials = trials.filter({correct: true});
        var accuracy = Math.round(correct_trials.count() / trials.count() * 100);
        return `<p>Testing complete. Total accuracy calculated at ${accuracy}%.</p>
          <p>Press any key to execute terminal synchronization functions and clear system data threads.</p>`;
      }
    };
    timeline.push(debrief_block);

    function transmitDataPayload(completeDataJson) {
      const TargetSecureEndpoint = "https://your-secure-project-id.supabase.co/rest/v1/simulation_logs"; 
      
      fetch(TargetSecureEndpoint, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer YOUR_PUBLIC_ANONYMOUS_API_KEY",
          "Prefer": "return=minimal" 
        },
        body: JSON.stringify({
          participant_token: "PARTICIPANT_" + Math.random().toString(36).substring(2, 8).toUpperCase(),
          timestamp_logged: new Date().toISOString(),
          payload_data: JSON.parse(completeDataJson)
        })
      })
      .then(response => {
        if (response.ok) {
          document.body.innerHTML = '<div style="text-align:center; margin-top:20%; font-family:Arial; color:#2e7d32;"><h3>Data synchronized successfully! Your text metrics and Base64 verbal strings are recorded. You may close this window.</h3></div>';
        } else {
          throw new Error('Network synchronization error.');
        }
      })
      .catch(error => {
        console.error('Pipeline Fault:', error);
        document.body.innerHTML = '<div style="text-align:center; margin-top:15%; font-family:Arial;"><h3>Server connection timed out.</h3><p>Your audio and tracking files remain compiled. Click below to save your log metrics manually.</p></div>';
        jsPsych.data.get().localSave('csv', 'fallback_backup_log.csv');
      });
    }

    /* start the experiment */
    jsPsych.run(timeline);

  </script>
</html>
