<!DOCTYPE html>
<html>
  <head>
    <title>Multimodal Proof of Concept Simulation</title>
    <script src="js/jspsych.js"></script>
    <link href="js/jspsych.css" rel="stylesheet" type="text/css" />

    <script src="js/plugin-html-keyboard-response.js"></script>
    <script src="js/plugin-image-keyboard-response.js"></script>
    <script src="js/plugin-preload.js"></script>

    <script src="js/webgazer.js"></script>
    <script src="js/extension-webgazer.js"></script>
    <script src="js/plugin-webgazer-init-camera.js"></script>
    <script src="js/plugin-webgazer-init-calibrate.js"></script>

    <script src="js/plugin-initialize-microphone.js"></script>
    <script src="js/plugin-html-audio-response.js"></script>
  </head>
  <body></body>
  <script>

    /* IRONCLAD DEFENSIVE HOTFIX: 
      Intercepts WebGazer's video visibility engine to prevent null-pointer 
      style crashes during jsPsych trial transitions. This keeps the 
      click-handler thread alive.
    */
    if (window.webgazer && typeof webgazer.showVideo === 'function') {
      var originalShowVideo = webgazer.showVideo;
      webgazer.showVideo = function(val) {
        if (document.getElementById('webgazerVideoFeed')) {
          return originalShowVideo.apply(this, arguments);
        } else {
          console.warn("Defensive Patch: Suppressed video style shift on missing DOM element.");
          return this;
        }
      };
    }

    /* Initialize jsPsych with the WebGazer Extension active */
    var jsPsych = initJsPsych({
      extensions: [
        { type: jsPsychExtensionWebgazer }
      ],
      on_finish: function() {
        // Visual loading indicator while transmission occurs
        document.body.innerHTML = '<div style="text-align:center; margin-top:20%; font-family:Arial;"><h3>Syncing data securely to central repository... Please do not close this tab.</h3></div>';
        
        // Trigger data pipeline transmission function
        transmitDataPayload(jsPsych.data.get().json());
      }
    });

    /* create timeline */
    var timeline = [];

    /* 1. Preload Images */
    var preload = {
      type: jsPsychPreload,
      images: ['img/blue.png', 'img/orange.png']
    };
    timeline.push(preload);

    /* 2. Microphone Hardware Initialization */
    var init_mic = {
      type: jsPsychInitializeMicrophone,
      error_message: "<p>Microphone access is required to participate in this study. Please check your browser settings and refresh.</p>"
    };
    timeline.push(init_mic);

    /* NEW ADDITION: Standalone Eye-Tracker Calibration Instructions Screen 
       This clears up the layout space so the calibration dots never get blocked by text banners.
    */
    var eye_tracker_instructions = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div style="width:650px; text-align:left; font-family:Arial, sans-serif; line-height:1.6; margin:auto; background:#f9f9f9; padding:30px; border:1px solid #ddd; border-radius:8px; box-shadow:0 4px 10px rgba(0,0,0,0.05);">
          <h2 style="color:#2980b9; margin-top:0; text-align:center;">🎯 Eye-Tracker Calibration Setup</h2>
          <p>Before beginning the main simulation, we need to calibrate the eye-tracking system to map your gaze accurately.</p>
          <ol style="padding-left:20px; margin-bottom: 20px;">
            <li><strong>Webcam Alignment:</strong> On the next screen, you will see a webcam view window. Center your face in the box until the tracking parameters lock, then click <strong>"Continue to Calibration"</strong>.</li>
            <li><strong>Training the Grid:</strong> A series of black dots will appear one by one across a completely blank white screen.</li>
            <li><strong>Look and Click:</strong> Look directly at each black dot and <strong>click it</strong>. The dot will move to a new position once it successfully records your eye coordinates. Follow it until the grid wraps up.</li>
          </ol>
          <p style="text-align:center; margin-top:25px; color:#7f8c8d; font-size: 14px;"><em>Tip: Ensure your room is well-lit and you remain sitting steady directly in front of the screen.</em></p>
          <p style="text-align:center; font-weight:bold; margin-bottom:0; padding-top:15px; border-top:1px solid #eee; color:#2c3e50;">Press any key to start the hardware setup.</p>
        </div>
      `
    };
    timeline.push(eye_tracker_instructions);

    /* 3. WebGazer Camera Authorization (Matches plugin-webgazer-init-camera.js) */
    var init_camera = {
      type: jsPsychWebgazerInitCamera,
      instructions: "<p>Center your face in the webcam window until the tracking indicators align.</p>",
      button_text: "Continue to Calibration"
    };
    timeline.push(init_camera);

    /* 4. WebGazer Calibration Grid Setup (Matches plugin-webgazer-init-calibrate.js) 
       Banners removed! Completely clean fullscreen space for dot clicking.
    */
    var calibration_grid = {
      type: jsPsychWebgazerCalibrate,
      calibration_mode: 'click',
      calibration_points: [[10,10], [10,50], [10,90], [50,10], [50,50], [50,90], [90,10], [90,50], [90,90]],
      point_size: 20
    };
    timeline.push(calibration_grid);

    /* 5. Welcome Message Trial */
    var welcome = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: "Welcome to the experiment. Press any key to begin."
    };
    timeline.push(welcome);

    /* 6. Instructions Trial */
    var instructions = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <p>In this experiment, a circle will appear in the center of the screen.</p>
        <p>If the circle is <strong>blue</strong>, press the letter F on the keyboard as fast as you can.</p>
        <p>If the circle is <strong>orange</strong>, press the letter J as fast as you can.</p>
        <div style='width: 700px; margin: auto; padding: 20px;'>
          <div style='float: left; margin-right: 50px;'><img src='img/blue.png'><p class='small'><strong>Press the F key</strong></p></div>
          <div style='float: right; margin-left: 50px;'><img src='img/orange.png'><p class='small'><strong>Press the J key</strong></p></div>
        </div>
        <p style='clear: both; padding-top: 20px;'>Press any key to begin.</p>
      `,
      post_trial_gap: 2000
    };
    timeline.push(instructions);

    var test_stimuli = [
      { stimulus: "img/blue.png",  correct_response: 'f'},
      { stimulus: "img/orange.png",  correct_response: 'j'}
    ];

    /* 7. Fixation Cross */
    var fixation = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: '<div style="font-size:60px;">+</div>',
      choices: "NO_KEYS",
      trial_duration: function(){
        return jsPsych.randomization.sampleWithoutReplacement([250, 500, 750, 1000, 1250, 1500, 1750, 2000], 1)[0];
      },
      data: {
        task: 'fixation'
      }
    };

    /* 8. Active Image Assessment with Eye-Tracking Targets Enabled */
    var test = {
      type: jsPsychImageKeyboardResponse,
      stimulus: jsPsych.timelineVariable('stimulus'),
      choices: ['f', 'j'],
      extensions: [
        {
          type: jsPsychExtensionWebgazer,
          params: { targets: ['#jspsych-image-keyboard-response-stimulus'] }
        }
      ],
      data: {
        task: 'response',
        correct_response: jsPsych.timelineVariable('correct_response')
      },
      on_finish: function(data){
        data.correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response);
      }
    };

    /* Define test procedure loop */
    var test_procedure = {
      timeline: [fixation, test],
      timeline_variables: test_stimuli,
      repetitions: 5,
      randomize_order: true
    };
    timeline.push(test_procedure);

    /* 9. Audio Response Reflection (Think-Aloud Component) */
    var audio_reflection = {
      type: jsPsychHtmlAudioResponse,
      stimulus: `
        <div style="width:650px; text-align:left; font-family:Arial, sans-serif; background:#f9f9f9; padding:20px; border:1px solid #ddd; border-radius:5px; margin:auto;">
          <h3>Retrospective Strategy Reflection</h3>
          <p>The tracking trials are complete. Please take up to 30 seconds to explain out loud the strategy you used to balance your response speed against accuracy.</p>
          <p style="color:#d9534f;"><strong>🎙️ Audio Recording Active. Please speak clearly into your microphone now...</strong></p>
        </div>
      `,
      recording_duration: 30000,
      show_done_button: true,
      data: { task: 'think_aloud_audio' }
    };
    timeline.push(audio_reflection);

    /* 10. Performance Debrief Display */
    var debrief_block = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function() {
        var trials = jsPsych.data.get().filter({task: 'response'});
        var correct_trials = trials.filter({correct: true});
        var accuracy = Math.round(correct_trials.count() / trials.count() * 100);
        var rt = Math.round(correct_trials.select('rt').mean());

        return `<p>You responded correctly on ${accuracy}% of the trials.</p>
          <p>Your average response time was ${rt}ms.</p>
          <p>Press any key to complete the experiment and sync your data. Thank you!</p>`;
      }
    };
    timeline.push(debrief_block);

    /* 11. Automated Data Centralization Transmission Pipe */
    function transmitDataPayload(completeDataJson) {
      const TargetSecureEndpoint = "https://your-secure-project-id.supabase.co/rest/v1/simulation_logs"; 
      
      fetch(TargetSecureEndpoint, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer YOUR_PUBLIC_ANONYMOUS_API_KEY",
          "Prefer": "return=minimal" 
        },
        body: JSON.stringify({
          participant_token: "PARTICIPANT_" + Math.random().toString(36).substring(2, 8).toUpperCase(),
          timestamp_logged: new Date().toISOString(),
          payload_data: JSON.parse(completeDataJson)
        })
      })
      .then(response => {
        if (response.ok) {
          document.body.innerHTML = '<div style="text-align:center; margin-top:20%; font-family:Arial; color:#2e7d32;"><h3>Data synchronized successfully! Your responses have been recorded. You may now close this window. Thank you.</h3></div>';
        } else {
          throw new Error('Network synchronization error.');
        }
      })
      .catch(error => {
        console.error('Pipeline Fault:', error);
        document.body.innerHTML = '<div style="text-align:center; margin-top:15%; font-family:Arial;"><h3>Server connection timed out.</h3><p>To protect your response data, please click the button below to download your log file manually and email it to the research team.</p></div>';
        jsPsych.data.get().localSave('csv', 'fallback_backup_log.csv');
      });
    }

    /* start the experiment */
    jsPsych.run(timeline);

  </script>
</html>
